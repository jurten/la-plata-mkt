<body class="bg-background text-on-surface antialiased font-manrope selection:bg-primary selection:text-on-primary">
<!-- TopNavBar -->
<header class="bg-white/80 dark:bg-black/80 backdrop-blur-xl w-full top-0 sticky border-b border-neutral-100 dark:border-neutral-900 z-50 transition-all duration-700 ease-[cubic-bezier(0.23,1,0.32,1)]">
<div class="flex justify-between items-center w-full px-10 py-8 max-w-[1920px] mx-auto">
<!-- Brand Logo -->
<a class="text-xl font-bold tracking-tighter text-black dark:text-white hover:opacity-60 transition-opacity duration-500" href="#">
                STUDIO
            </a>
<!-- Navigation Links -->
<nav class="hidden md:flex gap-8">
<a class="font-manrope uppercase tracking-[0.2em] text-[11px] font-medium text-neutral-400 dark:text-neutral-500 hover:text-black dark:hover:text-white transition-colors duration-500" href="#">Work</a>
<a class="font-manrope uppercase tracking-[0.2em] text-[11px] font-medium text-neutral-400 dark:text-neutral-500 hover:text-black dark:hover:text-white transition-colors duration-500" href="#">Services</a>
<a class="font-manrope uppercase tracking-[0.2em] text-[11px] font-medium text-neutral-400 dark:text-neutral-500 hover:text-black dark:hover:text-white transition-colors duration-500" href="#">About</a>
<a class="font-manrope uppercase tracking-[0.2em] text-[11px] font-medium text-black dark:text-white border-b border-black dark:border-white pb-1" href="#">Contact</a>
</nav>
<!-- Trailing Actions -->
<div class="flex items-center gap-6">
<button class="font-manrope uppercase tracking-[0.2em] text-[11px] font-medium text-black dark:text-white hover:opacity-60 transition-opacity duration-500">
                    ENG / ESP
                </button>
<button class="text-black dark:text-white hover:opacity-60 transition-opacity duration-500 flex items-center justify-center">
<span class="material-symbols-outlined text-lg" data-icon="dark_mode">dark_mode</span>
</button>
</div>
</div>
</header>
<!-- Main Content -->
<main class="w-full max-w-container-max mx-auto px-margin-edge pt-section-gap pb-section-gap">
<!-- Page Title -->
<div class="mb-[120px]">
<h1 class="font-display-2xl text-display-2xl text-on-surface">Let's build<br/>something.</h1>
</div>
<!-- 12-Column Grid Layout -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter">
<!-- Left Column: Contact Information -->
<div class="md:col-span-4 flex flex-col gap-[80px]">
<!-- Direct Contact -->
<div class="flex flex-col gap-6">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Inquiries</h2>
<div class="flex flex-col gap-2">
<a class="font-body-lg text-body-lg text-on-surface hover:opacity-60 transition-opacity duration-animation-duration-standard" href="mailto:hello@studio.com">hello@studio.com</a>
<a class="font-body-lg text-body-lg text-on-surface hover:opacity-60 transition-opacity duration-animation-duration-standard" href="tel:+18005550199">+1 800 555 0199</a>
</div>
</div>
<!-- Office Locations -->
<div class="flex flex-col gap-6">
<h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase">Offices</h2>
<div class="flex flex-col gap-8">
<div>
<h3 class="font-body-lg text-body-lg text-on-surface mb-1">New York</h3>
<p class="font-body-md text-body-md text-on-surface-variant">100 Broadway<br/>Suite 1400<br/>NY 10005</p>
</div>
<div>
<h3 class="font-body-lg text-body-lg text-on-surface mb-1">London</h3>
<p class="font-body-md text-body-md text-on-surface-variant">120 Oxford St<br/>West End<br/>W1D 1LT</p>
</div>
</div>
</div>
</div>
<!-- Right Column: Form Area -->
<div class="md:col-span-7 md:col-start-6 mt-16 md:mt-0">
<form action="#" class="flex flex-col gap-[64px]" method="POST">
<!-- Form Field: Name -->
<div class="flex flex-col group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-4 transition-colors group-focus-within:text-on-surface" for="name">Name</label>
<input class="bg-transparent border-0 border-b border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-body-lg text-body-lg text-on-surface w-full transition-colors duration-animation-duration-standard placeholder:text-transparent" id="name" name="name" required="" type="text"/>
</div>
<!-- Form Field: Email -->
<div class="flex flex-col group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-4 transition-colors group-focus-within:text-on-surface" for="email">Email Address</label>
<input class="bg-transparent border-0 border-b border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-body-lg text-body-lg text-on-surface w-full transition-colors duration-animation-duration-standard placeholder:text-transparent" id="email" name="email" required="" type="email"/>
</div>
<!-- Form Field: Subject -->
<div class="flex flex-col group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-4 transition-colors group-focus-within:text-on-surface" for="subject">Subject</label>
<select class="bg-transparent border-0 border-b border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-body-lg text-body-lg text-on-surface w-full transition-colors duration-animation-duration-standard appearance-none cursor-pointer" id="subject" name="subject">
<option value="new_project">New Project Inquiry</option>
<option value="careers">Careers</option>
<option value="press">Press &amp; Media</option>
<option value="other">Other</option>
</select>
<span class="material-symbols-outlined absolute right-0 bottom-5 text-on-surface-variant pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
<!-- Form Field: Message -->
<div class="flex flex-col group relative">
<label class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-4 transition-colors group-focus-within:text-on-surface" for="message">Message</label>
<textarea class="bg-transparent border-0 border-b border-outline-variant focus:border-on-surface focus:ring-0 px-0 py-4 font-body-lg text-body-lg text-on-surface w-full resize-none transition-colors duration-animation-duration-standard placeholder:text-transparent" id="message" name="message" required="" rows="4"></textarea>
</div>
<!-- Submit Action -->
<div class="pt-8">
<button class="bg-primary text-on-primary font-label-caps text-label-caps uppercase px-12 py-5 tracking-[0.1em] hover:bg-inverse-surface transition-colors duration-animation-duration-standard flex items-center justify-center gap-4" type="submit">
                            Send Inquiry
                            <span class="material-symbols-outlined text-[16px]" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</div>

</div>

<a class="font-manrope uppercase tracking-widest text-[10px] text-neutral-400 dark:text-neutral-600 hover:underline decoration-1 underline-offset-4 transition-all hover:text-black dark:hover:text-white" href="#">LinkedIn</a>
<a class="font-manrope uppercase tracking-widest text-[10px] text-neutral-400 dark:text-neutral-600 hover:underline decoration-1 underline-offset-4 transition-all hover:text-black dark:hover:text-white" href="#">Privacy Policy</a>
<a class="font-manrope uppercase tracking-widest text-[10px] text-neutral-400 dark:text-neutral-600 hover:underline decoration-1 underline-offset-4 transition-all hover:text-black dark:hover:text-white" href="#">Terms</a>
</div>
</div>
</footer>
